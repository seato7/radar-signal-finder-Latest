name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy coverage
      
      - name: Lint with ruff
        working-directory: ./backend
        run: ruff check .
      
      - name: Type check with mypy
        working-directory: ./backend
        run: mypy backend/ --ignore-missing-imports || true
      
      - name: Run tests with coverage
        working-directory: ./backend
        env:
          JWT_SECRET_KEY: test-secret-key-for-ci
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: test_opportunity_radar
          FRONTEND_PUBLIC_URL: http://localhost:5173
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-key
        run: |
          coverage run -m pytest -v
          coverage report
          coverage html
          coverage xml
      
      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        working-directory: ./backend
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); print(round(float(root.attrib['line-rate']) * 100, 1))")
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
          echo "Coverage: $COVERAGE%"
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            backend/htmlcov/
            backend/coverage.xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build
      
      - name: Check build size
        run: |
          echo "Build size:"
          du -sh dist
